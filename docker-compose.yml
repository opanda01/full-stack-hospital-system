services:
  postgres:
    image: postgres:16-alpine
    container_name: hastane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hastane
      POSTGRES_PASSWORD: hastane
      POSTGRES_DB: hastane_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hastane -d hastane_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hastane-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://hastane:hastane@postgres:5432/hastane_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Kaynak kod bind-mount; venv /opt/venv'de (Dockerfile) kalır, ezilmez
      - ./backend:/app
    command: ["/opt/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  postgres_data:
